version: "3.9"

services:
  api:
    image: ghcr.io/lavylavenderr/personal-api:latest
    command: >
      sh -c "pnpm run start:prod"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PORT=4000
      - AUTHORIZATION_KEY=${AUTHORIZATION_KEY}
      - CALLBACK_URL=${CALLBACK_URL}
      - DISCORD_ID=${DISCORD_ID}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET}
      - SPOTIFY_USER_ID=${SPOTIFY_USER_ID}
      - APPLE_TEAMID=${APPLE_TEAMID}
      - APPLEMAPS_KEYID=${APPLEMAPS_KEYID}
      - APPLEMAPS_KEY=${APPLEMAPS_KEY}
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - intranet
      - kennel
    depends_on:
      - redis

  redis:
    image: redis:6.2-alpine
    networks:
      - intranet
      - kennel
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  redisdata:

networks:
  intranet:
    driver: bridge
  kennel:
    external: true
    name: kennel
