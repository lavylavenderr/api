name: Publish to GitHub Packages

on:
  push:
    branches: ['master']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login to GitHub Docker Repo
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u lavylavenderr --password-stdin

      - name: Build Docker Image
        run: docker build -t api .

      - name: Tag Docker Image
        run: docker tag api ghcr.io/lavylavenderr/api:latest

      - name: Push Docker Image
        run: docker push ghcr.io/lavylavenderr/api:latest

    #   - name: Trigger Portainer Redeploy
